[kateto]
name = "Kateto"
language = "es"
debug = true
hot_reload = false

[plugin.audio_input_mic]
enabled = true
device = "pulse"
sample_rate = 16000
silence_timeout = 1.5
vad_model = "silero"

[plugin.audio_processor_whisper]
enabled = true
endpoint = "http://127.0.0.1:8090"

[plugin.executor_classifier]
enabled = true
