[kateto]
name = "Kateto"
language = "es"
debug = true
hot_reload = false

[plugin.audio_input_mic]
enabled = true
device = "default"
sample_rate = 16000
silence_timeout = 1.5
vad_model = "silero"

[plugin.audio_processor_whisper]
enabled = true
endpoint = "http://127.0.0.1:8090"

[plugin.executor_classifier]
enabled = true
model_endpoint = "http://127.0.0.1:8091"
model = "classifier"

[plugin.voice_llm]
enabled = true
endpoint = "http://127.0.0.1:11434/v1"
model = "openbmb/MiniCPM5-1B-GGUF:Q4_K_M"

[plugin.audio_output_zonos]
enabled = true
stream = false
endpoint = "http://127.0.0.1:8093"

[plugin.audio_output_player]
enabled = true

[voice.jane]
enabled = true
skills = ["orchestrator"]
mcp_servers = ["system"]
stream = false

[voice.doktor]
enabled = false
skills = ["backlog", "risk-analysis", "planning-poker"]
mcp_servers = ["system"]
stream = false

[voice.conquest]
enabled = false
skills = ["backlog"]
mcp_servers = ["system"]
stream = false

[mcp_servers.system]
command = "kateto"

[cli]
allowlist = ["git", "ls", "pwd", "cat", "echo", "date"]

[plugin.executor_interrupt]
enabled = true

[plugin.executor_todo_list]
enabled = true

[plugin.connector_cli]
enabled = true

[plugin.backlog]
enabled = true
