[plugin.voice_llm]
enabled = true
endpoint = "http://127.0.0.1:11434/v1"
model = "openbmb/MiniCPM5-1B-GGUF"

[plugin.audio_output_zonos]
enabled = true
endpoint = "http://127.0.0.1:8093"

[plugin.audio_output_player]
enabled = true

[voice.jane]
enabled = true
skills = ["orchestrator"]

[voice.doktor]
enabled = true
skills = ["backlog", "risk-analysis", "planning-poker"]

[voice.conquest]
enabled = true
skills = ["backlog"]

[mcp_servers]
[cli]
allowlist = ["git", "ls", "pwd", "cat", "echo", "date"]
