[kateto]
name = "Kateto"
language = "en"
debug = false
hot_reload = false

[plugin.audio_input_mic]
enabled = true
sample_rate = 16000
silence_timeout = 1.5
vad_model = "silero"

[plugin.audio_processor_whisper]
enabled = true
endpoint = "http://127.0.0.1:8090"

[plugin.executor_classifier]
enabled = true
model_endpoint = "http://127.0.0.1:8091"
model = "classifier"

[plugin.voice_llm]
enabled = true
endpoint = "http://127.0.0.1:8092/v1"
model = "voice"

[plugin.audio_output_zonos]
enabled = true
endpoint = "http://127.0.0.1:8093"

[plugin.audio_output_player]
enabled = true

[voice.jane]
enabled = true
skills = ["orchestrator"]
mcp_servers = ["system"]

[voice.doktor]
enabled = true
skills = ["backlog", "risk-analysis", "planning-poker"]
mcp_servers = ["system"]

[voice.conquest]
enabled = true
skills = ["backlog"]
mcp_servers = ["system"]

[mcp_servers.system]
command = "kateto"

[cli]
allowlist = ["git", "ls", "pwd", "cat", "echo", "date"]
